<!DOCTYPE html>
<html>
<head>
<title>Mobile Validation</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(120deg,#fc466b,#3f5efb);display:flex;justify-content:center;align-items:center;height:100vh;}
.card{background:white;padding:30px;border-radius:12px;width:320px;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
input{width:100%;padding:10px;margin-top:10px;}
</style>
</head>
<body>
<div class="card">
<h2>Mobile & Password</h2>
<input type="text" id="mobile" placeholder="Enter Mobile" onblur="validateMobile()">
<input type="password" id="pass" placeholder="Enter Password" onkeyup="checkPass()">
<p id="msg"></p>
</div>
<script>
function validateMobile(){
 let num=document.getElementById("mobile").value;
 let msg=document.getElementById("msg");
 let pattern=/^[0-9]{10}$/;
 if(pattern.test(num)) msg.innerText="Valid mobile";
 else msg.innerText="Invalid mobile";
}
function checkPass(){
 let pass=document.getElementById("pass").value;
 let strong=/^(?=.*[A-Z])(?=.*[!@#$%^&*]).{6,}$/;
 let msg=document.getElementById("msg");
 if(strong.test(pass)) msg.innerText="Strong Password";
 else msg.innerText="Weak Password";
}
</script>
</body>
</html>
