<html>
<head>
<title>Register</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(120deg,#141e30,#243b55);display:flex;justify-content:center;align-items:center;height:100vh;color:white;}
.card{background:white;color:black;padding:30px;border-radius:12px;width:350px;box-shadow:0 10px 25px rgba(0,0,0,0.3);}
input,button{width:100%;padding:10px;margin-top:10px;}
button{background:#243b55;color:white;border:none;cursor:pointer;}
</style>
</head>
<body>
<div class="card">
<h2>Registration Form</h2>
<form onsubmit="return validateForm()">
<input type="text" id="name" placeholder="Name">
<input type="text" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Password">
<button type="submit">Register</button>
<p id="msg"></p>
</form>
</div>
<script>
function validateForm(){
 let name=document.getElementById("name").value;
 let email=document.getElementById("email").value;
 let pass=document.getElementById("pass").value;
 let msg=document.getElementById("msg");
 let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
 let strong=/^(?=.*[A-Z])(?=.*[!@#$%^&*]).{6,}$/;

 if(name===""){ msg.innerText="Name required"; return false; }
 if(!emailPattern.test(email)){ msg.innerText="Invalid email"; return false; }
 if(!strong.test(pass)){ msg.innerText="Weak password"; return false; }
 alert("Registration Successful");
 return true;
}
</script>
</body>
</html>
