<!DOCTYPE html>
<html>
<head>
    <title>College Admission Registration</title>
</head>
<body bgcolor="#e6e6fa">
<center>
    <h2>College Admission Registration</h2>
    <table border="2" cellpadding="8" cellspacing="0" bgcolor="#ffffff">
        <tr>
            <td><label for="name">Full Name:</label></td>
            <td><input type="text" id="name" name="name" size="40"></td>
        </tr>
        <tr>
            <td><label for="email">Email:</label></td>
            <td><input type="email" id="email" name="email" size="40"></td>
        </tr>
        <tr>
            <td><label for="phone">Phone Number:</label></td>
            <td><input type="tel" id="phone" name="phone" size="40"></td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
                <input type="radio" name="gender" value="other"> Other
            </td>
        </tr>
        <tr>
            <td><label for="course">Course Applying For:</label></td>
            <td>
                <select id="course" name="course">
                    <option>B.Tech</option>
                    <option>B.Sc</option>
                    <option>B.Com</option>
                    <option>BA</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>Hobbies:</td>
            <td>
                <input type="checkbox" name="hobby" value="sports"> Sports
                <input type="checkbox" name="hobby" value="music"> Music
                <input type="checkbox" name="hobby" value="reading"> Reading
            </td>
        </tr>
        <tr>
            <td><label for="dob">Date of Birth:</label></td>
            <td><input type="date" id="dob" name="dob"></td>
        </tr>
        <tr>
            <td><label for="file">Upload Certificates:</label></td>
            <td><input type="file" id="file" name="file"></td>
        </tr>
        <tr>
            <td><label for="address">Address:</label></td>
            <td>
                <textarea id="address" name="address" rows="4" cols="35"></textarea>
            </td>
        </tr>
        <tr align="center">
            <td colspan="2">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </td>
        </tr>
    </table>
</center>
</body>
</html>
