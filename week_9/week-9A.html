<!DOCTYPE html>
<html>
<head>
    <title>Logic Programs</title>
    <style>
    body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        padding: 40px;
        width: 380px;
        text-align: center;
    }
    h2 {
        margin-bottom: 20px;
        color: #333;
    }
    input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border: 2px solid #ccc;
        border-radius: 8px;
        margin-bottom: 20px;
        box-sizing: border-box;
        text-align: center;
    }
    .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 24px;
    }
    button {
        padding: 12px;
        font-size: 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: white;
        font-weight: bold;
        background: #4a90e2;
        transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .output {
        background: gray;
        padding: 20px;
        border-radius: 8px;
        min-height: 60px;
        color: #333;
        font-size: 16px;
    }
    </style>
  </head>
  <body>
    <div class="container">
        <h2>Logic Programs</h2>
        <input type="number" id="numInput" placeholder="Enter a number" />
        <div class="buttons">
            <button onclick="evenOdd()">Even / Odd</button>
            <button onclick="primeCheck()">Prime / Not</button>
            <button onclick="factorial()">Factorial</button>
            <button onclick="armstrong()">Armstrong</button>
        </div>
        <div class="output" id="output">Result will appear here</div>
    </div>
    <script>
    function evenOdd() {
        let n = document.getElementById("numInput").value;
        if (n === "") {
            document.getElementById("output").textContent = "Enter a number";
            return;
        }
        if (n % 2 == 0)
            document.getElementById("output").textContent = n + " is Even";
        else
            document.getElementById("output").textContent = n + " is Odd";
    }
    function primeCheck() {
        let n = document.getElementById("numInput").value;
        if (n < 2) {
            document.getElementById("output").textContent = "Not Prime";
            return;
        }
        for (let i = 2; i < n; i++) {
            if (n % i == 0) {
                document.getElementById("output").textContent = "Not Prime";
                return;
            }
        }
        document.getElementById("output").textContent = "Prime";
    }
    function factorial() {
        let n = document.getElementById("numInput").value;
        let fact = 1;
        for (let i = 1; i <= n; i++) {
            fact *= i;
        }
        document.getElementById("output").textContent = "Factorial = " + fact;
    }
    function armstrong() {
        let n = document.getElementById("numInput").value;
        let temp = n;
        let sum = 0;
        let digits = n.length;
        while (temp > 0) {
            let r = temp % 10;
            sum += r ** digits;
            temp = Math.floor(temp / 10);
        }
        if (sum == n)
            document.getElementById("output").textContent = "Armstrong Number";
        else
            document.getElementById("output").textContent = "Not Armstrong";
    }
</script>
</body>
</html>
