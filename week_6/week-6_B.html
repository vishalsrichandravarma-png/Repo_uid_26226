<!DOCTYPE html>
<html>
<head>
<title>TOYS 4 TOYS</title>
<style>
body{
margin:0;
font-family:Arial;
color:#fff;
background:url("backgroundimages.jpg") center/cover fixed no-repeat;
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:-1;
}
.container{
display:grid;
grid-template:
"header header" auto
"sale sale" auto
"sidebar main" 1fr
"footer footer" auto /220px 1fr;
gap:15px;
padding:15px;
}
.header,.sale,.sidebar,.main,.footer{
background:rgba(40,40,40,.65);
border-radius:12px;
padding:15px;
box-shadow:0 0 15px #000;
}
.header{grid-area:header;text-align:center;font-size:28px;letter-spacing:3px;}
.sale{grid-area:sale;overflow:hidden;white-space:nowrap;height:40px;position:relative;}
.sale p{
position:absolute;
color:#00ffd5;
font-size:20px;
animation:move 10s linear infinite;
}
@keyframes move{
from{left:-100%;}
to{left:100%;}
}
.sidebar{grid-area:sidebar}
.sidebar ul{list-style:none;padding:0}
.sidebar li{margin:15px 0}
.sidebar a{
color:#fff;
text-decoration:none;
font-size:18px;
transition:.3s;
}
.sidebar a:hover{color:#00ffd5;padding-left:8px}
.main{grid-area:main}
iframe{width:100%;height:520px;border:0;background:rgba(0,0,0,.5);border-radius:10px}
.footer{grid-area:footer;text-align:center;font-size:14px;opacity:.85}

</head>
